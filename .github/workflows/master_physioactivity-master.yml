name: Build and deploy Node.js app to Azure Web App - physioactivity-master

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Set CI to false
        run: echo "CI=false" >> $GITHUB_ENV

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js version
        uses: actions/setup-node@v3
        with:
          node-version: '20.x'

      - name: Install dependencies and build the frontend
        run: |
          cd Frontend  # Navigate to the 'Frontend' folder where package.json is located
          npm install
          npm run build:ci

      - name: Debug Build Folder
        run: |
          cd Frontend  # Navigate again to the frontend folder
          ls -la build  # Verify the build folder exists and check contents

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: Frontend/build  # Correct path to the build folder

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: 'Production'
      url: ${{ steps.deploy-to-webapp.outputs.webapp-url }}
    permissions:
      id-token: write

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: node-app

      - name: Debug Downloaded Artifact
        run: ls -la  # Check the contents of the downloaded artifact

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        id: deploy-to-webapp
        with:
          app-name: 'physioactivity-master'
          slot-name: 'Production'
          package: ./node-app  # Path to the downloaded artifact
